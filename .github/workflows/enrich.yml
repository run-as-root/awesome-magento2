name: Enrich entries

on:
  schedule:
    - cron: '0 2 * * 1'   # Mondays 02:00 UTC
  workflow_dispatch:

concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - run: composer install --no-interaction --no-progress

      - run: composer enrich
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - run: php generate.php

      - name: Commit enrichment + regenerated README + event feeds
        run: |
          if git diff --quiet state/enrichment.json README.md events.ical events.json; then
            echo "No enrichment changes"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/enrichment.json README.md events.ical events.json
          git commit -m 'chore: refresh enrichment + regenerate readme + feeds'
          git pull --rebase origin master
          git push
