name: Regenerate README

on:
  push:
    branches: [master]
    paths:
      - 'content/**'
      - 'data/**'
      - 'lib/**'
      - 'state/**'
      - 'generate.php'
  workflow_dispatch:

concurrency:
  group: regenerate
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - run: composer install --no-interaction --no-progress

      - run: composer validate-data

      - run: vendor/bin/phpunit

      - run: php generate.php

      - name: Commit regenerated README + event feeds
        run: |
          if git diff --quiet README.md events.ical events.json; then
            echo "Artifacts unchanged"
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md events.ical events.json
          git commit -m 'chore: regenerate README + event feeds [skip ci]'
          git pull --rebase origin master
          git push
